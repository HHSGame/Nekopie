<circle cx="138" cy="12" r="3" fill="#8b6bff" opacity="0.3"/>
<circle cx="12" cy="198" r="3" fill="#8b6bff" opacity="0.3"/>
<circle cx="138" cy="198" r="3" fill="#8b6bff" opacity="0.3"/>
