    <stop offset="0%" stop-color="#3a2a5a"/><stop offset="100%" stop-color="#1a1a30"/>
  </linearGradient>
  <linearGradient id="cb" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#a98dff"/><stop offset="50%" stop-color="#6b4a8b"/><stop offset="100%" stop-color="#4a306a"/>
